; Generated by scripts/phone-agent-dev.sh start.
; Re-run start after changing PHONE_AGENT_SIP_* or PHONE_AGENT_BLF_* values.

[global]
type=global
user_agent=phone-agent-asterisk-mvp

[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060
external_signaling_address=192.168.10.1
external_media_address=192.168.10.1

[1001]
type=endpoint
transport=transport-udp
context=phone-agent-mvp
subscribe_context=phone-agent-mvp
disallow=all
allow=ulaw,alaw
auth=1001-auth
aors=1001
direct_media=no
rtp_symmetric=yes
force_rport=yes
rewrite_contact=no

[1001-auth]
type=auth
auth_type=userpass
username=1001
password=1001

[1001]
type=aor
max_contacts=1
remove_existing=yes

[phone-agent-slots]
type=resource_list
event=dialog
list_item=601
list_item=602
list_item=603
list_item=604
list_item=605
list_item=606
list_item=607
list_item=608
notification_batch_interval=500
