server.address=127.0.0.1
server.port=8080

management.endpoints.web.exposure.include=health

spring.datasource.url=jdbc:mysql://127.0.0.1:3307/phone_agent?useUnicode=true&characterEncoding=utf8&connectionTimeZone=LOCAL
spring.datasource.username=root
spring.datasource.password=root
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

phone-agent.runtime-dir=runtime
phone-agent.say-command=/usr/bin/say
phone-agent.ffmpeg-command=ffmpeg
phone-agent.asr.whisper-command=whisper
phone-agent.asr.model-path=models/whisper/ggml-small.bin
phone-agent.asr.language=zh
phone-agent.ami.host=127.0.0.1
phone-agent.ami.port=5038
phone-agent.ami.username=phone-agent
phone-agent.ami.secret=phone-agent
phone-agent.sip.extension=1001
phone-agent.sip.auth-id=1001
phone-agent.sip.password=1001
phone-agent.ring.target=PJSIP/1001
phone-agent.blf.eventlist-uri=phone-agent-slots
phone-agent.blf.extensions=601,602,603,604,605,606,607,608
phone-agent.command-timeout=PT30S
phone-agent.codex.codex-command=codex
phone-agent.codex.tmux-command=tmux
phone-agent.codex.ttyd-command=ttyd
phone-agent.codex.prompt-language=zh-CN
phone-agent.codex.sessions-dir=${user.home}/.codex/sessions
phone-agent.codex.registry-dir=runtime/codex-sessions
phone-agent.codex.allowed-workspace-roots[0]=${user.dir}
phone-agent.codex.poll-interval=PT2S
